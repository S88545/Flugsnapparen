{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-4">
  <h2 class="text-xl font-semibold">{{ title }} – lägenhet {{ apartment.apartment_number }}</h2>
</div>
<div class="card p-4 max-w-xl">
  <form method="post">
    <label class="block mb-2">Medlem</label>
    <select class="border rounded w-full p-2" name="member_id" required>
      <option value="">Välj medlem…</option>
      {% for m in members %}
        <option value="{{ m.id }}">{{ m.name }}</option>
      {% endfor %}
    </select>

    <label class="block mt-4 mb-2">Giltig från</label>
    <input class="border rounded w-full p-2" type="date" name="valid_from" required>

    <div class="mt-4">
      <button class="px-4 py-2 bg-blue-600 text-white rounded">Spara</button>
      <a class="ml-2 text-gray-700" href="{{ url_for('apartments.ownerships', apartment_id=apartment.id) }}">Avbryt</a>
    </div>
  </form>
  <p class="text-sm text-gray-600 mt-4">Om det finns ett pågående ägande avslutas det automatisk på valt datum.</p>
</div>
{% endblock %}
