{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-4">
  <h2 class="text-xl font-semibold">{{ title }}</h2>
</div>
<div class="card p-4 max-w-xl">
  <form method="post">
    <label class="block mb-2">Lägenhetsnummer</label>
    <input class="border rounded w-full p-2" type="text" name="apartment_number" value="{{ item.apartment_number if item else '' }}" required>

    <label class="block mt-4 mb-2">Yta (kvm)</label>
    <input class="border rounded w-full p-2" type="number" min="1" name="sqm_area" value="{{ item.sqm_area if item else '' }}" required>

    <label class="block mt-4 mb-2">År (för beräkning)</label>
    <select class="border rounded w-full p-2" name="year">
      {% for y in years %}
        <option value="{{ y }}">{{ y }}</option>
      {% endfor %}
    </select>
    <p class="text-sm text-gray-600 mt-2">Andel beräknas som YearlySettings.total_yta_kvm / Yta. Kvartalsavgift beräknas som (YearlySettings.totala_arsavgifter / Andel) / 4.</p>

    <div class="mt-4">
      <button class="px-4 py-2 bg-blue-600 text-white rounded">Spara</button>
      <a class="ml-2 text-gray-700" href="{{ url_for('apartments.list') }}">Avbryt</a>
    </div>
  </form>
</div>
{% endblock %}
