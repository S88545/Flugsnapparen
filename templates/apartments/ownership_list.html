{% extends 'base.html' %}
{% block title %}Ägande{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-4">
  <h2 class="text-xl font-semibold">Ägande för lägenhet {{ apartment.apartment_number }}</h2>
  <a class="px-4 py-2 bg-blue-600 text-white rounded" href="{{ url_for('apartments.ownership_add', apartment_id=apartment.id) }}">Ny post</a>
</div>
<div class="card p-4">
  <table class="min-w-full">
    <thead>
      <tr class="text-left">
        <th class="p-2">Medlem</th>
        <th class="p-2">Från</th>
        <th class="p-2">Till</th>
        <th class="p-2 w-40">Åtgärder</th>
      </tr>
    </thead>
    <tbody>
      {% for r in rows %}
      <tr class="border-t">
        <td class="p-2">{{ r.member_ref.name }}</td>
        <td class="p-2">{{ r.valid_from }}</td>
        <td class="p-2">{{ r.valid_to or '-' }}</td>
        <td class="p-2">
          <a class="text-blue-600" href="{{ url_for('apartments.ownership_edit', id=r.id) }}">Redigera</a>
          <form class="inline" method="post" action="{{ url_for('apartments.ownership_delete', id=r.id) }}" onsubmit="return confirm('Ta bort?');">
            <button class="text-red-600 ml-3" type="submit">Ta bort</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
