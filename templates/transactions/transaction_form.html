
{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<h2 class="text-3xl font-bold text-gray-800 mb-8">{{ title }}</h2>

<div class="card p-8 max-w-2xl mx-auto">
    <form method="POST">
        <div class="space-y-6">
            <!-- Datum -->
            <div>
                <label for="transaction_date" class="block text-sm font-medium text-gray-700">Datum</label>
                <input type="date" name="transaction_date" id="transaction_date"
                    value="{{ transaction.transaction_date.strftime('%Y-%m-%d') if transaction else '' }}"
                    class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                    required>
            </div>

            <!-- Beskrivning -->
            <div>
                <label for="description" class="block text-sm font-medium text-gray-700">Beskrivning</label>
                <input type="text" name="description" id="description"
                    value="{{ transaction.description if transaction else '' }}"
                    class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>

            <!-- Belopp -->
            <div>
                <label for="amount" class="block text-sm font-medium text-gray-700">Belopp</label>
                <div class="relative mt-1 rounded-md shadow-sm">
                    <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                        <span class="text-gray-500 sm:text-sm">kr</span>
                    </div>
                    <input type="number" step="0.01" name="amount" id="amount"
                        value="{{ transaction.amount if transaction else '' }}"
                        class="block w-full rounded-md border-gray-300 pl-8 pr-12 focus:border-blue-500 focus:ring-blue-500"
                        placeholder="0.00" required>
                </div>
                <p class="mt-2 text-xs text-gray-500">Använd minus (-) för utgifter, t.ex. -150.50.</p>
            </div>

            <!-- Transaktionstyp -->
            <div>
                <label for="transaction_type_id" class="block text-sm font-medium text-gray-700">Typ</label>
                <select name="transaction_type_id" id="transaction_type_id"
                    class="mt-1 block w-full py-2 px-3 border border-gray-300 bg-white rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                    required>
                    <option value="">Välj en typ...</option>
                    {% for type in transaction_types %}
                    <option value="{{ type.id }}" {% if transaction and transaction.transaction_type_id==type.id
                        %}selected{% endif %}>
                        {{ type.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <!-- Märkning: Medlem eller Leverantör -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="member_id" class="block text-sm font-medium text-gray-700">Medlem</label>
                    <select name="member_id" id="member_id"
                        class="mt-1 block w-full py-2 px-3 border border-gray-300 bg-white rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                        <option value="">Ingen</option>
                        {% for m in members %}
                        <option value="{{ m.id }}" {% if transaction and transaction.member_id==m.id %}selected{% endif %}>{{ m.name }}</option>
                        {% endfor %}
                    </select>
                    <p class="mt-1 text-xs text-gray-500">Välj antingen Medlem eller Leverantör, inte båda.</p>
                </div>
                <div>
                    <label for="supplier_id" class="block text-sm font-medium text-gray-700">Leverantör</label>
                    <select name="supplier_id" id="supplier_id"
                        class="mt-1 block w-full py-2 px-3 border border-gray-300 bg-white rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                        <option value="">Ingen</option>
                        {% for s in suppliers %}
                        <option value="{{ s.id }}" {% if transaction and transaction.supplier_id==s.id %}selected{% endif %}>{{ s.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>

        <!-- Knappar -->
        <div class="mt-8 pt-5 border-t border-gray-200 flex justify-end space-x-3">
            <a href="{{ url_for('transactions.list') }}"
                class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                Avbryt
            </a>
            <button type="submit"
                class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                Spara
            </button>
        </div>
    </form>
</div>
{% endblock %}
